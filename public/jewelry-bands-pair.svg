<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Aliancas</title>
  <desc id="desc">Card ilustrado de par de aliancas com acabamento dourado</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9f0"/>
      <stop offset="100%" stop-color="#e8d8bc"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4e2bb"/>
      <stop offset="50%" stop-color="#cd9d43"/>
      <stop offset="100%" stop-color="#8c6624"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="600" cy="420" r="250" fill="#fffdf8" opacity=".83"/>
  <circle cx="525" cy="575" r="170" fill="none" stroke="url(#gold)" stroke-width="30"/>
  <circle cx="675" cy="575" r="170" fill="none" stroke="url(#gold)" stroke-width="30"/>
  <text x="600" y="935" text-anchor="middle" fill="#6f531e" font-family="Georgia, serif" font-size="64" letter-spacing="7">ALIANCAS</text>
  <text x="600" y="996" text-anchor="middle" fill="#897867" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="28" letter-spacing="8">COMPROMISSO</text>
</svg>
