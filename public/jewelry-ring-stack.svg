<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Anel dueto</title>
  <desc id="desc">Card ilustrado de anel duplo com dois aros paralelos</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="100%" stop-color="#ede0cb"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2dfb9"/>
      <stop offset="55%" stop-color="#cc9f4b"/>
      <stop offset="100%" stop-color="#8d6723"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="600" cy="420" r="250" fill="#fffdf8" opacity=".82"/>
  <circle cx="565" cy="570" r="162" fill="none" stroke="url(#gold)" stroke-width="18"/>
  <circle cx="635" cy="570" r="162" fill="none" stroke="url(#gold)" stroke-width="18"/>
  <circle cx="565" cy="408" r="14" fill="#fffdfb" stroke="#d8c08a" stroke-width="7"/>
  <circle cx="635" cy="408" r="14" fill="#fffdfb" stroke="#d8c08a" stroke-width="7"/>
  <text x="600" y="935" text-anchor="middle" fill="#6f531e" font-family="Georgia, serif" font-size="64" letter-spacing="6">ANEL DUETO</text>
  <text x="600" y="996" text-anchor="middle" fill="#897867" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="28" letter-spacing="8">DOIS AROS</text>
</svg>
