<div class="container-app" [class.container-app-admin]="isAdminRoute()">

    @if (!isAdminRoute()) {
        <app-header></app-header>
    }

    <main class="container-main" [class.container-main-admin]="isAdminRoute()">
        <router-outlet></router-outlet>
    </main>

    @if (!isAdminRoute()) {
        <app-footer></app-footer>

        <app-floating-contact-cta />
    }

</div>
