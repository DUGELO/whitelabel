<section class="not-found-modal" aria-labelledby="product-not-found-title" aria-describedby="product-not-found-description">
	<div class="modal-visual" aria-hidden="true">
		<img [src]="storefrontConfig().brand.notFoundImagePath" alt="Illustration of a person looking at an empty storefront shelf">
	</div>

	<div class="modal-copy">
		<p class="eyebrow">{{ storefrontConfig().content.productNotFoundEyebrow }}</p>
		<h1 id="product-not-found-title">{{ storefrontConfig().content.notFoundTitle }}</h1>
		<p id="product-not-found-description">{{ storefrontConfig().content.notFoundDescription }}</p>

		<a class="primary-action" routerLink="/">{{ storefrontConfig().content.notFoundBrowseLabel }}</a>
	</div>
</section>
