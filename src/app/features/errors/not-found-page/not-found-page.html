<div class="not-found-backdrop">
  <section class="not-found-modal" aria-labelledby="not-found-title" aria-describedby="not-found-description">
    <div class="modal-visual" aria-hidden="true">
      <img [src]="storefrontConfig().brand.notFoundImagePath" alt="Illustration of a person looking at an empty storefront shelf">
    </div>

    <div class="modal-copy">
      <p class="eyebrow">{{ storefrontConfig().content.pageNotFoundEyebrow }}</p>
      <h1 id="not-found-title">{{ storefrontConfig().content.notFoundTitle }}</h1>
      <p id="not-found-description">{{ storefrontConfig().content.notFoundDescription }}</p>

      <div class="action-row">
        <a class="primary-action" routerLink="/">{{ storefrontConfig().content.backToHomeLabel }}</a>
        <a class="secondary-action" routerLink="/search">{{ storefrontConfig().content.notFoundBrowseLabel }}</a>
      </div>
    </div>
  </section>
</div>
